<svg width="1200" height="340" viewBox="0 0 1200 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mohammed Messaoudi DevOps profile banner</title>
  <desc id="desc">Animated dark banner showing a DevOps pipeline from idea to code, test, build, and deploy.</desc>
  <style>
    .bg { fill: #0b1220; }
    .grid { stroke: #1f3554; stroke-width: 1; opacity: .35; }
    .line { stroke: #2dd4bf; stroke-width: 4; stroke-linecap: round; stroke-dasharray: 18 18; animation: flow 2.2s linear infinite; }
    .line2 { stroke: #60a5fa; animation-duration: 2.8s; }
    .node { fill: #101b30; stroke: #2dd4bf; stroke-width: 3; }
    .node-blue { stroke: #60a5fa; }
    .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .float { animation: float 3s ease-in-out infinite; }
    .float2 { animation: float 3.7s ease-in-out infinite; }
    .title { fill: #f8fafc; font: 700 54px Arial, Helvetica, sans-serif; letter-spacing: 0; }
    .subtitle { fill: #cbd5e1; font: 500 24px Arial, Helvetica, sans-serif; letter-spacing: 0; }
    .small { fill: #94a3b8; font: 600 16px Arial, Helvetica, sans-serif; letter-spacing: 0; }
    .tag { fill: #13223a; stroke: #334155; stroke-width: 1; }
    .tagtext { fill: #e2e8f0; font: 600 17px Arial, Helvetica, sans-serif; letter-spacing: 0; }
    .spark { fill: #38bdf8; animation: blink 1.8s ease-in-out infinite; }
    .spark2 { fill: #2dd4bf; animation-delay: .45s; }
    .spark3 { fill: #a78bfa; animation-delay: .9s; }
    @keyframes flow { to { stroke-dashoffset: -36; } }
    @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.07); opacity: .82; } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes blink { 0%,100% { opacity: .25; } 50% { opacity: 1; } }
  </style>

  <rect class="bg" width="1200" height="340" rx="22"/>
  <g>
    <path class="grid" d="M80 0V340M160 0V340M240 0V340M320 0V340M400 0V340M480 0V340M560 0V340M640 0V340M720 0V340M800 0V340M880 0V340M960 0V340M1040 0V340M1120 0V340"/>
    <path class="grid" d="M0 60H1200M0 120H1200M0 180H1200M0 240H1200M0 300H1200"/>
  </g>

  <circle class="spark spark1" cx="1005" cy="70" r="5"/>
  <circle class="spark spark2" cx="1085" cy="122" r="6"/>
  <circle class="spark spark3" cx="1028" cy="260" r="4"/>
  <circle class="spark spark2" cx="1125" cy="230" r="5"/>

  <text class="title" x="70" y="104">Mohammed Messaoudi</text>
  <text class="subtitle" x="73" y="144">DevOps-minded developer building, testing, and shipping software</text>

  <g transform="translate(72 184)">
    <rect class="tag" x="0" y="0" width="130" height="38" rx="19"/>
    <text class="tagtext" x="22" y="25">Azure DevOps</text>
    <rect class="tag" x="148" y="0" width="82" height="38" rx="19"/>
    <text class="tagtext" x="172" y="25">CI/CD</text>
    <rect class="tag" x="248" y="0" width="104" height="38" rx="19"/>
    <text class="tagtext" x="273" y="25">Docker</text>
    <rect class="tag" x="370" y="0" width="130" height="38" rx="19"/>
    <text class="tagtext" x="395" y="25">ASP.NET</text>
    <rect class="tag" x="518" y="0" width="116" height="38" rx="19"/>
    <text class="tagtext" x="548" y="25">Angular</text>
  </g>

  <g transform="translate(640 88)">
    <path class="line" d="M70 80H185"/>
    <path class="line line2" d="M285 80H400"/>
    <path class="line" d="M500 80H570"/>

    <g class="float">
      <rect class="node pulse" x="0" y="35" width="90" height="90" rx="18"/>
      <text class="small" x="27" y="85">IDEA</text>
    </g>
    <g class="float2">
      <rect class="node node-blue pulse" x="175" y="35" width="110" height="90" rx="18"/>
      <text class="small" x="213" y="76">CODE</text>
      <text class="small" x="217" y="98">&amp; API</text>
    </g>
    <g class="float">
      <rect class="node pulse" x="390" y="35" width="110" height="90" rx="18"/>
      <text class="small" x="426" y="76">TEST</text>
      <text class="small" x="414" y="98">&amp; BUILD</text>
    </g>
    <g class="float2">
      <rect class="node node-blue pulse" x="560" y="35" width="110" height="90" rx="18"/>
      <text class="small" x="590" y="76">SHIP</text>
      <text class="small" x="587" y="98">CLOUD</text>
    </g>
  </g>
</svg>
