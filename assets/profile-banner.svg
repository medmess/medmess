<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mohammed Messaoudi DevOps Engineer banner</title>
  <desc id="desc">Premium animated DevOps banner with CI/CD flow, cloud deployment, monitoring, and automation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111F"/>
      <stop offset="0.48" stop-color="#0B172A"/>
      <stop offset="1" stop-color="#071827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="0.45" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    .frame { fill: url(#bg); }
    .grid { stroke: #1E3A5F; stroke-width: 1; opacity: .28; }
    .headline { fill: #F8FAFC; font: 700 52px Arial, Helvetica, sans-serif; letter-spacing: 0; }
    .sub { fill: #CBD5E1; font: 500 23px Arial, Helvetica, sans-serif; letter-spacing: 0; }
    .muted { fill: #94A3B8; font: 600 15px Arial, Helvetica, sans-serif; letter-spacing: 0; }
    .chip { fill: #0F2238; stroke: #254966; stroke-width: 1; }
    .chipText { fill: #E2E8F0; font: 700 15px Arial, Helvetica, sans-serif; letter-spacing: 0; }
    .panel { fill: #0A1524; stroke: #1E3A5F; stroke-width: 1.4; }
    .panel2 { fill: #0D1C31; stroke: #2DD4BF; stroke-width: 1.4; }
    .pipe { stroke: url(#accent); stroke-width: 5; stroke-linecap: round; stroke-dasharray: 16 18; animation: move 2.4s linear infinite; filter: url(#softGlow); }
    .pulse { animation: pulse 2.1s ease-in-out infinite; transform-origin: center; }
    .pulse2 { animation-delay: .35s; }
    .pulse3 { animation-delay: .7s; }
    .pulse4 { animation-delay: 1.05s; }
    .scan { animation: scan 3.3s ease-in-out infinite; }
    .fade { animation: fade 2s ease-in-out infinite; }
    .fade2 { animation-delay: .5s; }
    .fade3 { animation-delay: 1s; }
    @keyframes move { to { stroke-dashoffset: -34; } }
    @keyframes pulse { 0%,100% { opacity: .92; transform: scale(1); } 50% { opacity: 1; transform: scale(1.035); } }
    @keyframes scan { 0% { transform: translateY(-45px); opacity: 0; } 18%,70% { opacity: .75; } 100% { transform: translateY(95px); opacity: 0; } }
    @keyframes fade { 0%,100% { opacity: .32; } 50% { opacity: 1; } }
  </style>

  <rect class="frame" width="1200" height="360" rx="24"/>
  <path class="grid" d="M80 0V360M160 0V360M240 0V360M320 0V360M400 0V360M480 0V360M560 0V360M640 0V360M720 0V360M800 0V360M880 0V360M960 0V360M1040 0V360M1120 0V360"/>
  <path class="grid" d="M0 60H1200M0 120H1200M0 180H1200M0 240H1200M0 300H1200"/>

  <g transform="translate(70 64)">
    <text class="headline" x="0" y="46">Mohammed Messaoudi</text>
    <text class="sub" x="2" y="84">DevOps Engineer | Azure DevOps | CI/CD | Docker | Kubernetes | Cloud</text>
    <text class="muted" x="2" y="118">I build delivery pipelines, test release flows, and connect code to reliable deployment.</text>
    <g transform="translate(0 154)">
      <rect class="chip" width="118" height="34" rx="17"/>
      <text class="chipText" x="23" y="22">CI/CD</text>
      <rect class="chip" x="132" width="140" height="34" rx="17"/>
      <text class="chipText" x="158" y="22">Azure DevOps</text>
      <rect class="chip" x="286" width="105" height="34" rx="17"/>
      <text class="chipText" x="317" y="22">Docker</text>
      <rect class="chip" x="405" width="126" height="34" rx="17"/>
      <text class="chipText" x="430" y="22">Kubernetes</text>
      <rect class="chip" x="545" width="115" height="34" rx="17"/>
      <text class="chipText" x="576" y="22">Cloud</text>
    </g>
  </g>

  <g transform="translate(665 74)">
    <rect class="panel" x="0" y="0" width="420" height="216" rx="20"/>
    <rect class="panel2 pulse" x="32" y="42" width="78" height="62" rx="14"/>
    <rect class="panel2 pulse pulse2" x="154" y="42" width="78" height="62" rx="14"/>
    <rect class="panel2 pulse pulse3" x="276" y="42" width="78" height="62" rx="14"/>
    <path class="pipe" d="M110 73H154M232 73H276"/>
    <text class="chipText" x="51" y="79">CODE</text>
    <text class="chipText" x="170" y="79">TEST</text>
    <text class="chipText" x="294" y="79">BUILD</text>

    <rect class="panel" x="32" y="136" width="354" height="44" rx="12"/>
    <path class="pipe" d="M58 158H360"/>
    <circle class="fade" cx="84" cy="158" r="6" fill="#38BDF8"/>
    <circle class="fade fade2" cx="198" cy="158" r="6" fill="#2DD4BF"/>
    <circle class="fade fade3" cx="318" cy="158" r="6" fill="#A78BFA"/>

    <rect class="scan" x="24" y="46" width="372" height="22" rx="11" fill="url(#accent)" opacity=".24"/>
  </g>

  <g transform="translate(810 286)">
    <text class="muted" x="0" y="0">PLAN</text>
    <text class="muted" x="70" y="0">BUILD</text>
    <text class="muted" x="145" y="0">TEST</text>
    <text class="muted" x="210" y="0">DEPLOY</text>
    <text class="muted" x="300" y="0">MONITOR</text>
  </g>
</svg>
